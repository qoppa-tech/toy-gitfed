services:
  psql_test:
    image: postgres:17-alpine
    ports:
      - "${POSTGRES_TEST_HOST_PORT:-5433}:5432"
    environment:
      POSTGRES_USER: gitfed_test
      POSTGRES_PASSWORD: gitfed_test
      POSTGRES_DB: gitfed_test
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U gitfed_test -d gitfed_test"]
      interval: 2s
      timeout: 3s
      retries: 30
    tmpfs:
      - /var/lib/postgresql/data

  redis_test:
    image: redis:7-alpine
    ports:
      - "${REDIS_TEST_HOST_PORT:-6380}:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 2s
      timeout: 3s
      retries: 30
    tmpfs:
      - /data
